rules:
  - id: context-relay-no-python-runtime
    message: Native Semgrep packages must not contain Pysemgrep or a Python runtime.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/METADATA"
        - "**/RECORD"
        - "**/*.pth"
        - "**/runtime-inventory.txt"
    patterns:
      - pattern-regex: "(?i)(pysemgrep|site-packages|python(?:3(?:\\.\\d+)?)?(?:\\.exe)?)"
